# WandB sweep: MNIST IID - SWTS
program: tools/wandb_sweep_bandit.py
method: random
metric:
  name: test/global_eval_acc1
  goal: maximize

parameters:
  scheduler:
    value: swts
  config_path_swts:
    value: appfl_sim/config/adaptive_local_steps/mnist_iid/swts.yaml

  window_size:
    values: [10, 20, 50]
  posterior_variance:
    values: [1e-7, 1e-6, 1e-5]
  prior_variance:
    values: [1e-5, 1e-3]

  seed:
    values: [0]
  wandb_entity:
    value: "vaseline555"
