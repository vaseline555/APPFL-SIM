# WandB sweep: CIFAR10 non-IID (Dirichlet) - dslints_c
program: tools/wandb_sweep_bandit.py
method: random
metric:
  name: test/global_eval_acc1
  goal: maximize

parameters:
  scheduler:
    value: dslints_c
  config_path_dslints_c:
    value: appfl_sim/config/adaptive_local_steps/cifar10_diri/dslints_c.yaml

  discount_gamma:
    values: [0.95, 0.99, 0.995]
  ridge_alpha:
    values: [0.1, 1.0, 10.0]
  noise_beta:
    values: [1e-3, 1e-2, 1e-1]
  context_dim:
    value: 2

  seed:
    values: [0]
  wandb_entity:
    value: "vaseline555"
