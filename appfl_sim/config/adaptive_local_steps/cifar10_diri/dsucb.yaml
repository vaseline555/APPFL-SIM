experiment:
  name: GenFL_Discounted
  seed: 42
  device: cuda
  server_device: cuda
  backend: nccl
  stateful: true
dataset:
  path: ./data
  name: CIFAR10
  backend: torchvision
  download: true
split:
  type: dirichlet
  configs:
    dirichlet_alpha: 0.01
    dirichlet_min_size: 50
model:
  name: LeNet
  backend: custom
train:
  num_rounds: 300
  num_clients: 10
  num_sampled_clients: 10
  update_base: epoch
  local_epochs: 1
  batch_size: 32
  shuffle: true
  eval_batch_size: 256
algorithm:
  name: dsucb
  mix_coefs: sample_ratio
  optimize_memory: true
  aggregator: DsucbAggregator
  scheduler: DsucbScheduler
  trainer: DsucbTrainer
  aggregator_kwargs:
    client_weights_mode: sample_ratio
  scheduler_kwargs:
    action_space: [1, 2, 3, 4, 5]
    add_cost_reward: false
    cost_reward_lambda: 0.005
    discount_gamma: 0.99
    exploration_alpha: 0.001
  trainer_kwargs: {}
loss:
  name: CrossEntropyLoss
  backend: torch
optimizer:
  name: SGD
  backend: auto
  lr: 0.00316
  lr_decay:
    enable: true
    type: multistep
    milestones: "120,200,260"
    gamma: 0.5
  clip_grad_norm: 0.0
  configs:
    weight_decay: 0.0
    momentum: 0.0
eval:
  every: 10
  metrics:
  - acc1
  do_pre_evaluation: true
  do_post_evaluation: true
  show_eval_progress: true
  enable_global_eval: true
  enable_federated_eval: true
  configs:
    scheme: dataset
    dataset_ratio:
    - 70
    - 20
    - 10
logging:
  path: ./log
  name: cifar10_diri_dsucb
  backend: wandb
  type: server_only
  configs:
    track_gen_rewards: true
    wandb_mode: online
    wandb_entity: ""
