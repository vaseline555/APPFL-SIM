experiment:
  name: GenFL_MNIST
  seed: 42
  device: cuda
  server_device: cuda
  backend: serial
  stateful: true
dataset:
  path: ./data
  name: MNIST
  backend: torchvision
  download: true
split:
  type: dirichlet
  configs:
    dirichlet_alpha: 0.1
    dirichlet_min_size: 100
model:
  name: LeNet
  backend: custom
  configs:
    hidden_size: 64
    dropout: 0.0
train:
  num_rounds: 100
  num_clients: 10
  num_sampled_clients: 10
  update_base: epoch
  local_epochs: 1
  batch_size: 64
  num_workers: 2
  shuffle: true
  eval_batch_size: 256
algorithm:
  name: gale_scaffold_r
  mix_coefs: sample_ratio
  optimize_memory: true
  aggregator: ScaffoldAggregator
  scheduler: DslinucbRScheduler
  trainer: ScaffoldTrainer
  aggregator_kwargs:
    client_weights_mode: sample_ratio
  scheduler_kwargs:
    reward_scale: 10.0
    action_space: [1, 2, 4, 8]
    discount_gamma: 0.99
    ridge_alpha: 1.0
    exploration_beta: 1.0
    contexts: [l, d]
  trainer_kwargs: {}
loss:
  name: CrossEntropyLoss
  backend: torch
optimizer:
  name: SGD
  backend: auto
  lr: 0.01
  lr_decay:
    enable: true
    type: exponential
    gamma: 0.99
  clip_grad_norm: 0.0
  configs:
    weight_decay: 0.0
    momentum: 0.0
eval:
  every: 20
  metrics:
  - acc1
  - acc5
  do_pre_evaluation: true
  do_post_evaluation: false
  show_eval_progress: true
  enable_global_eval: true
  enable_federated_eval: false
  configs:
    scheme: dataset
    dataset_ratio:
    - 70
    - 20
    - 10
logging:
  path: ./log
  name: mnist_diri_gale_scaffold_r
  backend: wandb
  type: server_only
  configs:
    track_gen_rewards: true
    wandb_mode: online
    wandb_entity: ""
