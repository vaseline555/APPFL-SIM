experiment:
  name: GenFL_FEMNIST
  seed: 42
  device: cuda
  server_device: cuda
  backend: serial
  stateful: true
dataset:
  path: ./data
  name: FEMNIST
  backend: leaf
  download: true
  configs:
    raw_data_fraction: 1.0
    min_samples_per_client: 2
split:
  type: pre
  configs:
    pre_infer_num_clients: true
model:
  name: SimpleCNN
  backend: custom
  configs:
    hidden_size: 64
train:
  num_rounds: 1000
  num_sampled_clients: 10
  update_base: epoch
  local_epochs: 1
  batch_size: 16
  shuffle: true
  eval_batch_size: 256
algorithm:
  name: gale_avg
  mix_coefs: sample_ratio
  optimize_memory: true
  aggregator: FedavgAggregator
  scheduler: DsucbScheduler
  trainer: FedavgTrainer
  aggregator_kwargs:
    client_weights_mode: sample_ratio
  scheduler_kwargs:
    reward_scale: 10.0
    action_space: [1, 2, 4, 8]
    discount_gamma: null
    exploration_alpha: null
  trainer_kwargs: {}
loss:
  name: CrossEntropyLoss
  backend: torch
optimizer:
  name: SGD
  backend: auto
  lr: 0.01
  lr_decay:
    enable: true
    type: exponential
    gamma: 0.998
  clip_grad_norm: 0.0
  configs:
    weight_decay: 0.0
    momentum: 0.0
eval:
  every: 200
  metrics:
  - acc1
  - acc5
  do_pre_evaluation: true
  do_post_evaluation: true
  show_eval_progress: true
  enable_global_eval: false
  enable_federated_eval: true
  configs:
    scheme: dataset
    dataset_ratio:
    - 70
    - 20
    - 10
logging:
  path: ./log
  name: femnist_gale_avg
  backend: wandb
  type: server_only
  configs:
    track_gen_rewards: true
