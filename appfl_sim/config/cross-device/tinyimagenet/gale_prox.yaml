experiment:
  name: GenFL_TinyImageNet
  seed: 42
  device: cuda
  server_device: cuda
  backend: serial
  stateful: true
dataset:
  path: ./data
  name: zh-plus/tiny-imagenet
  backend: hf
  download: true
  configs:
    train_split: train
    test_split: valid
    feature_key: image
    label_key: label
split:
  type: dirichlet
  configs:
    dirichlet_alpha: 0.1
    dirichlet_min_size: 10
model:
  name: mobilenet_v3_small
  backend: torchvision
  configs:
    pretrained: false
    norm_layer: groupnorm
    norm_num_groups: 2
train:
  num_rounds: 1000
  num_clients: 500
  num_sampled_clients: 5
  update_base: epoch
  local_epochs: 1
  batch_size: 32
  num_workers: 2
  train_pin_memory: false
  eval_pin_memory: false
  shuffle: true
  eval_batch_size: 32
algorithm:
  name: gale_prox
  mix_coefs: sample_ratio
  optimize_memory: true
  aggregator: FedproxAggregator
  scheduler: DsucbScheduler
  trainer: FedproxTrainer
  aggregator_kwargs:
    client_weights_mode: sample_ratio
  scheduler_kwargs:
    reward_scale: 10.0
    action_space: [1, 2, 4]
    discount_gamma: null
    exploration_alpha: null
  trainer_kwargs:
    mu: 0.001
loss:
  name: CrossEntropyLoss
  backend: torch
optimizer:
  name: SGD
  backend: auto
  lr: 0.01
  lr_decay:
    enable: true
    type: exponential
    gamma: 0.998
  clip_grad_norm: 0.0
  configs:
    weight_decay: 0.0
    momentum: 0.0
eval:
  every: 200
  metrics:
  - acc1
  - acc5
  do_pre_evaluation: true
  do_post_evaluation: false
  show_eval_progress: true
  enable_global_eval: true
  enable_federated_eval: false
  configs:
    scheme: dataset
    dataset_ratio:
    - 70
    - 20
    - 10
logging:
  path: ./log
  name: tinyimagenet_gale_prox
  backend: wandb
  type: server_only
  configs:
    track_gen_rewards: true
